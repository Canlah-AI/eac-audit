<section class="eac-cover">
  <div class="eac-cover-logo">
    <svg viewBox="0 0 380 120" width="380" xmlns="http://www.w3.org/2000/svg">
      <text x="190" y="52" text-anchor="middle" font-family="'Google Sans', 'Product Sans', 'Inter', sans-serif" font-size="48" font-weight="500" fill="#4285F4">G<tspan fill="#EA4335">o</tspan><tspan fill="#FBBC04">o</tspan><tspan fill="#4285F4">g</tspan><tspan fill="#34A853">l</tspan><tspan fill="#EA4335">e</tspan></text>
      <text x="190" y="100" text-anchor="middle" font-family="'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="30" font-weight="500" fill="#202124">谷歌跨境电商加速中心</text>
    </svg>
  </div>
  <div class="eac-cover-divider"></div>
  <div class="eac-cover-title">基础设施诊断报告</div>
  <div class="eac-cover-subtitle">Infrastructure Audit Report</div>
  <div class="eac-cover-client">
    <div class="eac-cover-brand">{{ brand_name }}</div>
    {% if target_url %}<div class="eac-cover-url">{{ target_url }}</div>{% endif %}
  </div>
  <div class="eac-cover-meta">
    <div class="eac-cover-meta-row">
      <span class="eac-cover-meta-label">报告日期</span>
      <span>{{ audit_date }}</span>
    </div>
    <div class="eac-cover-meta-row">
      <span class="eac-cover-meta-label">目标市场</span>
      <span>{{ target_markets | default('全球') }}</span>
    </div>
    <div class="eac-cover-meta-row">
      <span class="eac-cover-meta-label">报告编制</span>
      <span>Canlah AI x 谷歌跨境电商加速中心</span>
    </div>
  </div>
  <div class="eac-cover-bar">
    <span class="bar-seg bar-blue"></span>
    <span class="bar-seg bar-red"></span>
    <span class="bar-seg bar-yellow"></span>
    <span class="bar-seg bar-green"></span>
  </div>
</section>
